name: VXIS Growth Loop

on:
  # Cost guard: this job can run for hours. Trigger only when explicitly requested.
  repository_dispatch:
    types: [growth-loop-validate]

  workflow_dispatch:
    inputs:
      score_target:
        description: "목표 점수 (기본 1000)"
        required: false
        default: "1000"
        type: string
      target_type:
        description: "벤치마크 대상"
        required: false
        default: "web"
        type: choice
        options:
          - web
          - game
          - mobile

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  issues: write

concurrency:
  group: growth-loop
  cancel-in-progress: true

jobs:
  growth-loop:
    name: Autonomous Growth Loop
    runs-on: ubuntu-latest
    timeout-minutes: 350

    services:
      dvwa:
        image: vulnerables/web-dvwa
        ports:
          - 8081:80
      juice-shop:
        image: bkimminich/juice-shop
        ports:
          - 3000:3000
      vampi:
        image: erev0s/vampi:latest
        ports:
          - 5001:5000

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install VXIS
        run: pip install -e ".[dev]" 2>/dev/null || { echo "PYTHONPATH=src" >> "$GITHUB_ENV"; pip install -e . 2>/dev/null || true; }

      - name: Restore score history
        uses: actions/cache@v6
        with:
          path: tools/benchmark/
          key: growth-loop-${{ github.run_id }}
          restore-keys: growth-loop-

      - name: Growth Loop — 점수 목표까지 자율 성장
        id: growth
        env:
          PYTHONPATH: src
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          VXIS_BRAIN_MODE: api
          SCORE_TARGET: ${{ github.event.inputs.score_target || '1000' }}
        timeout-minutes: 340
        run: |
          python - <<'PYEOF'
          import asyncio, json, os, subprocess, sys, time, urllib.request, urllib.error
          from datetime import datetime, timezone
          from pathlib import Path

          sys.path.insert(0, "src")

          SCORE_TARGET = int(os.environ.get("SCORE_TARGET", "1000"))
          STAGNATION_LIMIT = 2        # 연속 N회 개선 없으면 종료
          MIN_IMPROVEMENT = 5.0       # 개선으로 인정하는 최소 점수 차
          HISTORY_FILE = Path("tools/benchmark/score_history.json")
          BASELINE_FILE = Path("tools/benchmark/baseline.json")
          ITERATION_LOG = Path("tools/benchmark/iteration_log.json")
          CVE_CANDIDATES = Path("tools/cve_watch/growth_loop_candidates.json")
          HISTORY_FILE.parent.mkdir(parents=True, exist_ok=True)

          together_key = os.environ.get("TOGETHER_API_KEY", "")
          anthropic_key = os.environ.get("ANTHROPIC_API_KEY", "")

          history = json.loads(HISTORY_FILE.read_text()) if HISTORY_FILE.exists() else []
          iterations: list[dict] = []

          # ── CVE 피드 로드 ─────────────────────────────────────────────
          cve_vectors: list[dict] = []
          if CVE_CANDIDATES.exists():
              try:
                  cve_data = json.loads(CVE_CANDIDATES.read_text())
                  cve_vectors = cve_data.get("vectors", [])
                  print(f"[CVE] {len(cve_vectors)}개 CVE 공격 벡터 로드")
              except Exception as exc:
                  print(f"[CVE] 로드 실패: {exc}")

          targets = [
              ("dvwa",       "http://localhost:8081",           "web"),
              ("juice-shop", "http://localhost:3000",           "web"),
              ("vampi",      "http://localhost:5001",           "web"),
          ]

          # ── Docker 준비 대기 ──────────────────────────────────────────
          for name, url, _ in targets:
              for attempt in range(20):
                  try:
                      urllib.request.urlopen(url, timeout=3)
                      print(f"[READY] {name}")
                      break
                  except Exception:
                      time.sleep(3)
              else:
                  print(f"[SKIP] {name} not ready after 60s")

          # ── 벤치마크 실행 ─────────────────────────────────────────────
          def run_benchmark(target_name: str, target_url: str, target_type: str = "web") -> dict:
              try:
                  from vxis.scoring.benchmark import BenchmarkRunner
                  runner = BenchmarkRunner(baseline_path=str(BASELINE_FILE))

                  async def _run():
                      score = await runner.run_benchmark(target_type, target_url)
                      comparison = runner.compare_with_baseline(score)
                      return score, comparison, runner

                  score, comparison, runner = asyncio.run(_run())
                  return {
                      "target": target_name,
                      "total": score.total,
                      "grade": score.grade,
                      "dimensions": {
                          "vector_coverage":    score.vector_coverage.score,
                          "exploitation_reach": score.exploitation_reach.score,
                          "chain_intelligence": score.chain_intelligence.score,
                          "finding_precision":  score.finding_precision.score,
                          "completeness":       score.completeness.score,
                      },
                      "delta":      comparison.total_delta if comparison else 0,
                      "score_obj":  score,
                      "comparison": comparison,
                      "runner":     runner,
                  }
              except Exception as exc:
                  return {"target": target_name, "total": 0.0, "grade": "D", "error": str(exc)[:300]}

          # ── 약점 차원 찾기 ────────────────────────────────────────────
          _DIM_MAX = {
              "vector_coverage": 250, "exploitation_reach": 300,
              "chain_intelligence": 150, "finding_precision": 200,
              "completeness": 100,
          }
          _DIM_KO = {
              "vector_coverage": "벡터 커버리지", "exploitation_reach": "공격 깊이",
              "chain_intelligence": "체인 지능",   "finding_precision": "발견 정확도",
              "completeness": "완전성",
          }

          def find_weakest(result: dict) -> tuple[str, float]:
              dims = result.get("dimensions", {})
              if not dims:
                  return "", 0.0
              return min(
                  ((d, s / _DIM_MAX[d]) for d, s in dims.items() if d in _DIM_MAX),
                  key=lambda x: x[1],
              )

          # ── LLM 코드 개선 패치 생성 ───────────────────────────────────
          _DIM_FILES = {
              "vector_coverage":    ["src/vxis/scoring/vectors.py", "src/vxis/pipeline/scan_pipeline_v2.py"],
              "exploitation_reach": ["src/vxis/agent/brain.py", "src/vxis/agent/scan_loop.py"],
              "chain_intelligence": ["src/vxis/agent/brain.py", "src/vxis/agent/scan_loop.py"],
              "finding_precision":  ["src/vxis/agent/brain.py", "src/vxis/agent/tools/verifier_tools.py"],
              "completeness":       ["src/vxis/pipeline/scan_pipeline_v2.py", "src/vxis/agent/scan_loop.py"],
          }

          def llm_generate_patches(weakest_dim: str, dim_score: float, iteration: int) -> list[dict]:
              """LLM에게 약점 차원 개선 search/replace 패치 생성 요청."""
              if not together_key and not anthropic_key:
                  return []

              relevant_files = _DIM_FILES.get(weakest_dim, [])
              file_ctx_parts = []
              for fpath in relevant_files[:2]:
                  p = Path(fpath)
                  if p.exists():
                      content = p.read_text(encoding="utf-8", errors="ignore")
                      file_ctx_parts.append(f"### {fpath}\n```python\n{content[:1800]}\n...(truncated)\n```")

              pct = (dim_score / _DIM_MAX.get(weakest_dim, 100)) * 100

              system_prompt = """You are a senior security engineer improving VXIS, an autonomous AI pentesting platform.
          VXIS Brain (LLM) drives all attack decisions. 5D scoring measures real attack capability on live vulnerable apps.

          Output ONLY valid JSON (no markdown wrapper):
          {
            "analysis": "why this dimension scores low and what to improve",
            "patches": [
              {
                "file": "src/vxis/...",
                "search": "exact existing code string to find",
                "replace": "replacement string"
              }
            ]
          }

          Rules:
          - max 3 patches
          - search must EXACTLY match existing code (copy-paste accuracy)
          - changes must be minimal and targeted to the specific dimension
          - do NOT break existing function signatures or class interfaces
          - focus on Brain prompt quality, strategy hints, or pipeline coverage"""

              user_prompt = f"""Weakest dimension: {weakest_dim} ({_DIM_KO.get(weakest_dim, '')})
          Score: {dim_score:.1f}/{_DIM_MAX.get(weakest_dim, 100)} ({pct:.0f}%)
          Iteration: {iteration}

          Relevant source code:
          {chr(10).join(file_ctx_parts) if file_ctx_parts else '(no context)'}

          Generate targeted patches to improve the {weakest_dim} score on real vulnerable web apps (DVWA, Juice Shop, WebGoat, VAmPI)."""

              # Together AI 우선 (저렴), Anthropic 폴백
              if together_key:
                  url = "https://api.together.xyz/v1/chat/completions"
                  payload = json.dumps({
                      "model": "meta-llama/Llama-3.3-70B-Instruct-Turbo",
                      "max_tokens": 1500,
                      "temperature": 0.2,
                      "messages": [
                          {"role": "system", "content": system_prompt},
                          {"role": "user", "content": user_prompt},
                      ],
                  }).encode()
                  headers = {
                      "Content-Type": "application/json",
                      "Authorization": f"Bearer {together_key}",
                  }
              else:
                  url = "https://api.anthropic.com/v1/messages"
                  payload = json.dumps({
                      "model": "claude-haiku-4-5-20251001",
                      "max_tokens": 1500,
                      "system": system_prompt,
                      "messages": [{"role": "user", "content": user_prompt}],
                  }).encode()
                  headers = {
                      "Content-Type": "application/json",
                      "x-api-key": anthropic_key,
                      "anthropic-version": "2023-06-01",
                  }

              req = urllib.request.Request(url, data=payload, headers=headers, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=90) as resp:
                      data = json.loads(resp.read().decode())

                  if together_key:
                      raw = data["choices"][0]["message"]["content"]
                  else:
                      raw = data["content"][0]["text"]

                  # JSON 추출
                  raw = raw.strip()
                  if "```json" in raw:
                      raw = raw.split("```json")[1].split("```")[0]
                  elif "```" in raw:
                      raw = raw.split("```")[1].split("```")[0]

                  result = json.loads(raw.strip())
                  analysis = result.get("analysis", "")
                  patches = result.get("patches", [])
                  print(f"  [LLM] 분석: {analysis[:120]}")
                  print(f"  [LLM] 패치 {len(patches)}개 생성")
                  return patches
              except Exception as exc:
                  print(f"  [LLM] 패치 생성 실패: {exc}")
                  return []

          def apply_patches(patches: list[dict]) -> dict[str, str]:
              """패치 적용. 적용 전 백업 반환 {filepath: original_content}."""
              backups: dict[str, str] = {}
              for patch in patches:
                  fpath = Path(patch.get("file", ""))
                  search = patch.get("search", "")
                  replace = patch.get("replace", "")
                  if not fpath.exists() or not search or search == replace:
                      continue
                  content = fpath.read_text(encoding="utf-8")
                  if search in content:
                      backups[str(fpath)] = content
                      fpath.write_text(content.replace(search, replace, 1), encoding="utf-8")
                      print(f"  [PATCH] {fpath} 패치 적용")
                  else:
                      print(f"  [PATCH] 검색 문자열 없음: {fpath}")
              return backups

          def restore_backups(backups: dict[str, str]) -> None:
              for fpath_str, content in backups.items():
                  Path(fpath_str).write_text(content, encoding="utf-8")
              if backups:
                  subprocess.run(["pip", "install", "-e", ".", "-q"], check=False,
                                 capture_output=True)
                  print(f"  [REVERT] {len(backups)}개 파일 롤백 완료")

          def reinstall_vxis() -> bool:
              result = subprocess.run(
                  ["pip", "install", "-e", ".", "-q"],
                  capture_output=True, text=True,
              )
              return result.returncode == 0

          def commit_improvement(weakest_dim: str, iteration: int, score_delta: float) -> None:
              try:
                  subprocess.run(["git", "config", "user.name", "vxis-growth[bot]"], check=False)
                  subprocess.run(["git", "config", "user.email", "vxis-growth@users.noreply.github.com"], check=False)
                  subprocess.run(["git", "add", "src/"], check=False)
                  msg = (
                      f"feat(growth): auto-merge {weakest_dim} +{score_delta:.1f}pt "
                      f"[iter {iteration}]\n\n"
                      f"Autonomous growth loop — verified ≥{MIN_IMPROVEMENT}pt improvement\n"
                      f"Dimension: {_DIM_KO.get(weakest_dim, weakest_dim)}"
                  )
                  result = subprocess.run(
                      ["git", "commit", "-m", msg],
                      capture_output=True, text=True,
                  )
                  if result.returncode == 0:
                      subprocess.run(["git", "pull", "--rebase", "origin", "main"], check=False)
                      subprocess.run(["git", "push"], check=False)
                      print(f"  [GIT] 개선 코드 커밋 완료")
              except Exception as exc:
                  print(f"  [GIT] 커밋 실패: {exc}")

          # ═══════════════════════════════════════════════════════════════
          #  메인 루프: 점수 목표 달성까지 자율 성장
          # ═══════════════════════════════════════════════════════════════
          now = datetime.now(timezone.utc)
          print(f"\n{'#'*60}")
          print(f"  VXIS Growth Loop — {now.strftime('%Y-%m-%d %H:%M')} UTC")
          print(f"  목표: {SCORE_TARGET}점 | 정체 한도: {STAGNATION_LIMIT}회")
          print(f"  CVE 공격벡터: {len(cve_vectors)}개")
          print(f"{'#'*60}\n")

          prev_best = 0.0
          consecutive_no_improve = 0
          iteration = 0
          stop_reason = "unknown"

          while True:
              iteration += 1
              print(f"\n{'='*60}")
              print(f"  ITERATION {iteration}")
              print(f"{'='*60}")

              # 전체 타겟 벤치마크
              iter_results = []
              for target_name, target_url, target_type in targets:
                  print(f"\n  --- {target_name} ---")
                  result = run_benchmark(target_name, target_url, target_type)
                  iter_results.append(result)
                  if "error" not in result:
                      print(f"  Score: {result['total']:.1f} [{result['grade']}]")
                      history.append({
                          "date": now.strftime("%Y-%m-%d"),
                          "iteration": iteration,
                          "target_name": target_name,
                          "target_type": target_type,
                          "total": result["total"],
                          "grade": result["grade"],
                          "dimensions": result["dimensions"],
                      })
                  else:
                      print(f"  ERROR: {result['error']}")

              valid_results = [r for r in iter_results if "error" not in r]
              if not valid_results:
                  stop_reason = "all_targets_failed"
                  print("\n[STOP] 모든 타겟 실패")
                  break

              current_best = max(r["total"] for r in valid_results)
              best_result = max(valid_results, key=lambda r: r["total"])
              best_target = next(t for t in targets if t[0] == best_result["target"])

              print(f"\n  현재 최고: {current_best:.1f}점 [{best_result['grade']}]")

              # ── 목표 달성 체크 ────────────────────────────────────────
              if current_best >= SCORE_TARGET:
                  stop_reason = "target_reached"
                  print(f"\n[SUCCESS] 목표 {SCORE_TARGET}점 달성! ({current_best:.1f}점)")
                  break

              # ── 정체 체크 ─────────────────────────────────────────────
              improvement = current_best - prev_best
              if iteration > 1:
                  if improvement < MIN_IMPROVEMENT:
                      consecutive_no_improve += 1
                      print(f"  [PLATEAU] 개선 {improvement:+.1f}점 — 정체 {consecutive_no_improve}/{STAGNATION_LIMIT}")
                      if consecutive_no_improve >= STAGNATION_LIMIT:
                          stop_reason = "stagnation"
                          print(f"\n[STOP] {STAGNATION_LIMIT}회 연속 정체 → 종료")
                          break
                  else:
                      consecutive_no_improve = 0
                      print(f"  [GROWTH] +{improvement:.1f}점 성장!")

              # ── 약점 분석 ─────────────────────────────────────────────
              weakest_dim, weakest_pct = find_weakest(best_result)
              dim_score = best_result["dimensions"].get(weakest_dim, 0)
              print(f"  약점: {_DIM_KO.get(weakest_dim, weakest_dim)} ({weakest_pct:.0%})")

              # ── LLM 코드 개선 ─────────────────────────────────────────
              iter_log = {
                  "iteration": iteration,
                  "timestamp": datetime.now(timezone.utc).isoformat(),
                  "best_score": current_best,
                  "weakest_dimension": weakest_dim,
                  "weakest_pct": round(weakest_pct, 2),
                  "improvement": round(improvement, 1),
                  "consecutive_no_improve": consecutive_no_improve,
                  "action": "none",
                  "code_improved": False,
              }

              patches = llm_generate_patches(weakest_dim, dim_score, iteration)
              if patches:
                  backups = apply_patches(patches)
                  if backups:
                      ok = reinstall_vxis()
                      if ok:
                          # 최고 타겟에서 재테스트
                          print(f"  [TEST] {best_target[0]}에서 개선 효과 검증...")
                          verify_result = run_benchmark(*best_target)
                          verify_score = verify_result.get("total", 0.0)
                          verify_delta = verify_score - current_best

                          if verify_delta >= MIN_IMPROVEMENT:
                              print(f"  [KEEP] +{verify_delta:.1f}점 개선 확인 (≥{MIN_IMPROVEMENT}) → main 자동 머지")
                              commit_improvement(weakest_dim, iteration, verify_delta)
                              iter_log["action"] = f"improved_{weakest_dim}"
                              iter_log["code_improved"] = True
                              iter_log["verify_delta"] = round(verify_delta, 1)
                          else:
                              print(f"  [REVERT] 개선 효과 없음 ({verify_delta:+.1f}) → 롤백")
                              restore_backups(backups)
                              iter_log["action"] = f"reverted_{weakest_dim}"
                      else:
                          print("  [REVERT] 재설치 실패 → 롤백")
                          restore_backups(backups)
                          iter_log["action"] = "reinstall_failed"
                  else:
                      iter_log["action"] = "no_patches_applied"
              else:
                  iter_log["action"] = "no_patches_generated"

              iterations.append(iter_log)
              prev_best = current_best

              print(f"\n  [WAIT] 20초 후 다음 iteration...")
              time.sleep(20)

          # ═══ 최종 결과 저장 ═══
          if len(history) > 365:
              history[:] = history[-365:]
          HISTORY_FILE.write_text(json.dumps(history, indent=2, ensure_ascii=False))

          final_log = {
              "date": now.strftime("%Y-%m-%d"),
              "stop_reason": stop_reason,
              "total_iterations": len(iterations),
              "score_target": SCORE_TARGET,
              "start_score": iterations[0]["best_score"] if iterations else 0,
              "final_score": iterations[-1]["best_score"] if iterations else 0,
              "total_growth": round(
                  (iterations[-1]["best_score"] - iterations[0]["best_score"])
                  if len(iterations) >= 2 else 0, 1
              ),
              "code_improvements": sum(1 for it in iterations if it.get("code_improved")),
              "iterations": iterations,
          }
          ITERATION_LOG.write_text(json.dumps(final_log, indent=2, ensure_ascii=False))

          # 요약 출력
          print(f"\n{'#'*60}")
          print(f"  Growth Loop 완료 — {stop_reason}")
          print(f"  반복: {len(iterations)}회")
          print(f"  점수: {final_log['start_score']:.1f} → {final_log['final_score']:.1f} (+{final_log['total_growth']:.1f})")
          print(f"  코드 개선: {final_log['code_improvements']}회")
          print(f"{'#'*60}")

          # 환경변수로 결과 전달
          with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as f:
              f.write(f"final_score={final_log['final_score']:.1f}\n")
              f.write(f"stop_reason={stop_reason}\n")
              f.write(f"iterations={len(iterations)}\n")
              f.write(f"code_improvements={final_log['code_improvements']}\n")
          PYEOF

      - name: Archive benchmark data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: growth-loop-benchmark-data
          path: tools/benchmark/
          if-no-files-found: ignore

      - name: Create growth summary issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FINAL_SCORE="${{ steps.growth.outputs.final_score }}"
          STOP_REASON="${{ steps.growth.outputs.stop_reason }}"
          ITERATIONS="${{ steps.growth.outputs.iterations }}"
          CODE_IMPROVEMENTS="${{ steps.growth.outputs.code_improvements }}"

          if [ -n "$FINAL_SCORE" ]; then
            BODY="## Growth Loop Summary — $(date -u +%Y-%m-%d)

          | 항목 | 값 |
          |------|-----|
          | 최종 점수 | ${FINAL_SCORE} / 1000 |
          | 종료 이유 | ${STOP_REASON} |
          | 총 반복 | ${ITERATIONS}회 |
          | 코드 개선 | ${CODE_IMPROVEMENTS}회 |

          자세한 내용: \`tools/benchmark/iteration_log.json\`"

            gh issue create \
              --title "Growth Loop: $(date -u +%Y-%m-%d) — ${FINAL_SCORE}/1000 [${STOP_REASON}]" \
              --body "$BODY" \
              --label "growth-loop,benchmark" 2>/dev/null || true
          fi

      # Rollback signal-driven changes if regression detected
      - name: Rollback on regression (signal-driven changes)
        if: always() && github.event_name == 'repository_dispatch'
        env:
          PYTHONPATH: src
        run: |
          STOP_REASON="${{ steps.growth.outputs.stop_reason }}"
          if [ "$STOP_REASON" = "regression" ] || [ "$STOP_REASON" = "stagnation" ]; then
            echo "Regression detected — rolling back recent signal-driven proposals"
            python - <<'PYEOF'
          from vxis.growth.rollback import rollback_since
          from datetime import datetime, timezone, timedelta
          # Rollback last 24h worth of auto-applied proposals
          cutoff = (datetime.now(timezone.utc) - timedelta(hours=24)).isoformat()
          count = rollback_since(cutoff)
          print(f"Rolled back {count} proposals (cutoff: {cutoff})")
          PYEOF
            git config user.name "vxis-growth[bot]"
            git config user.email "vxis-growth@users.noreply.github.com"
            git add src/vxis/agent/skills/ 2>/dev/null || true
            if ! git diff --staged --quiet 2>/dev/null; then
              git commit -m "chore(growth): rollback signal-driven changes + skill payloads (regression detected)" || true
              git pull --rebase origin main || true
              git push || true
            fi
            # Smart rollback: isolate problematic payloads instead of removing all
            python - <<'SMART_ROLLBACK'
          import asyncio, os, urllib.request, urllib.parse
          from vxis.growth.payload_validator import isolate_regression
          from vxis.growth.rollback import rollback_proposal

          bad = asyncio.run(isolate_regression())
          if bad:
              for pid in bad:
                  rollback_proposal(pid, reason="regression_isolated")
              msg = f"REGRESSION — {len(bad)} payload(s) isolated and rolled back:\n"
              msg += "\n".join(f"  - {pid}" for pid in bad[:5])
          else:
              # Can't isolate — fall back to full rollback
              from vxis.growth.rollback import rollback_since
              from datetime import datetime, timezone, timedelta
              cutoff = (datetime.now(timezone.utc) - timedelta(hours=24)).isoformat()
              count = rollback_since(cutoff)
              msg = f"REGRESSION — couldn't isolate. Rolled back {count} proposal(s) from last 24h."

          print(msg)
          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          if token and chat_id:
              url = f"https://api.telegram.org/bot{token}/sendMessage"
              data = urllib.parse.urlencode({"chat_id": chat_id, "text": "🔴 " + msg}).encode()
              try:
                  urllib.request.urlopen(url, data=data, timeout=10)
              except Exception:
                  pass
          SMART_ROLLBACK
          else
            echo "No regression — signal-driven changes retained"
          fi
