name: VXIS Growth Loop

on:
  # 매주 일요일 15:00 UTC (일요일 자정 KST) — 밤새 반복 성장
  schedule:
    - cron: "0 15 * * 0"

  workflow_dispatch:
    inputs:
      max_iterations:
        description: "최대 반복 횟수 (기본 5)"
        required: false
        default: "5"
        type: string
      target_type:
        description: "벤치마크 대상"
        required: false
        default: "web"
        type: choice
        options:
          - web
          - game
          - mobile

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  issues: write

jobs:
  growth-benchmark:
    name: Growth Measurement
    runs-on: ubuntu-latest

    # Docker 취약 앱 — 매일 밤 자동 기동 (모두 법적으로 허용된 테스트 전용 앱)
    services:
      dvwa:
        image: vulnerables/web-dvwa          # OWASP DVWA — PHP/MySQL 기반
        ports:
          - 8081:80
      juice-shop:
        image: bkimminich/juice-shop         # OWASP Juice Shop — Node.js SPA
        ports:
          - 3000:3000
      webgoat:
        image: webgoat/webgoat               # OWASP WebGoat — Spring Boot
        ports:
          - 8888:8080
      mutillidae:
        image: citizenstig/nowasp            # OWASP Mutillidae II — PHP/MySQL, 100+ 취약점
        ports:
          - 8082:80
      bwapp:
        image: raesene/bwapp                 # bWAPP — PHP 버그 많은 웹앱, 100+ CWE
        ports:
          - 8083:80
      nodegoat:
        image: owasp/nodegoat                # OWASP NodeGoat — Node.js OWASP Top 10
        ports:
          - 4000:4000
      vampi:
        image: erev0s/vampi:latest           # VAmPI — Flask REST API 취약점 (OWASP API Top 10)
        ports:
          - 5001:5000
      bodgeit:
        image: psiinon/bodgeit               # BodgeIt Store — Java/Tomcat, 간단한 레거시 앱
        ports:
          - 8084:8080

    strategy:
      matrix:
        target_type: [web]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install VXIS
        run: pip install -e ".[dev]" 2>/dev/null || echo "PYTHONPATH=src" >> $GITHUB_ENV

      - name: Restore score history
        uses: actions/cache@v4
        with:
          path: tools/benchmark/
          key: growth-loop-${{ github.run_id }}
          restore-keys: growth-loop-

      - name: Growth Loop — 측정→분석→개선→재측정 반복
        id: benchmark
        env:
          PYTHONPATH: src
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          VXIS_BRAIN_MODE: api
        timeout-minutes: 370  # 자정~06:00 KST (6시간 + 여유)
        run: |
          MAX_ITER=${{ github.event.inputs.max_iterations || '0' }}
          python - "$MAX_ITER" <<'PYEOF'
          import asyncio, json, os, sys, time, urllib.request, urllib.error
          from pathlib import Path
          from datetime import datetime, timezone

          sys.path.insert(0, "src")

          # 0 = 시간 기반 (06:00 KST = 21:00 UTC까지), 양수 = 횟수 제한
          _max_iter_arg = int(sys.argv[1]) if len(sys.argv) > 1 else 0
          MAX_ITERATIONS = _max_iter_arg if _max_iter_arg > 0 else None  # None = 시간까지 무한
          STOP_HOUR_UTC = 21  # 21:00 UTC = 06:00 KST
          HISTORY_FILE = Path("tools/benchmark/score_history.json")
          BASELINE_FILE = Path("tools/benchmark/baseline.json")
          ITERATION_LOG = Path("tools/benchmark/iteration_log.json")
          HISTORY_FILE.parent.mkdir(parents=True, exist_ok=True)

          history = json.loads(HISTORY_FILE.read_text()) if HISTORY_FILE.exists() else []
          iterations: list[dict] = []

          targets = [
              ("dvwa",       "http://localhost:8081"),
              ("juice-shop", "http://localhost:3000"),
              ("webgoat",    "http://localhost:8888/WebGoat"),
              ("mutillidae", "http://localhost:8082/mutillidae"),
              ("bwapp",      "http://localhost:8083/bWAPP"),
              ("nodegoat",   "http://localhost:4000"),
              ("vampi",      "http://localhost:5001"),
              ("bodgeit",    "http://localhost:8084/bodgeit"),
          ]

          # Docker 서비스 준비 대기
          for name, url in targets:
              for attempt in range(15):
                  try:
                      urllib.request.urlopen(url, timeout=2)
                      print(f"[READY] {name}")
                      break
                  except Exception:
                      time.sleep(2)
              else:
                  print(f"[SKIP] {name} not ready")

          def run_benchmark(target_name, target_url, target_type="web"):
              """단일 타겟 벤치마크 실행."""
              try:
                  from vxis.scoring.benchmark import BenchmarkRunner
                  runner = BenchmarkRunner(baseline_path=str(BASELINE_FILE))

                  async def _run():
                      score = await runner.run_benchmark(target_type, target_url)
                      comparison = runner.compare_with_baseline(score)
                      return score, comparison

                  score, comparison = asyncio.run(_run())
                  return {
                      "target": target_name,
                      "total": score.total,
                      "grade": score.grade,
                      "dimensions": {
                          "vector_coverage": score.vector_coverage.score,
                          "exploitation_reach": score.exploitation_reach.score,
                          "chain_intelligence": score.chain_intelligence.score,
                          "finding_precision": score.finding_precision.score,
                          "completeness": score.completeness.score,
                      },
                      "delta": comparison.total_delta if comparison else 0,
                      "score_obj": score,
                      "comparison": comparison,
                      "runner": runner,
                  }
              except Exception as exc:
                  return {"target": target_name, "total": 0, "grade": "D", "error": str(exc)[:200]}

          def find_weakest_dimension(result):
              """가장 약한 차원 찾기."""
              if "dimensions" not in result:
                  return None, 0
              dims = result["dimensions"]
              max_scores = {
                  "vector_coverage": 250,
                  "exploitation_reach": 300,
                  "chain_intelligence": 150,
                  "finding_precision": 200,
                  "completeness": 100,
              }
              weakest = None
              weakest_pct = 1.0
              for dim, score in dims.items():
                  pct = score / max_scores[dim]
                  if pct < weakest_pct:
                      weakest_pct = pct
                      weakest = dim
              return weakest, weakest_pct

          def analyze_and_improve(weakest_dim, iteration):
              """약점 차원에 맞는 자동 개선 시도.

              실제 코드를 바꾸지는 않지만, Brain의 전략을 동적으로 조정.
              """
              # 개선 전략 매핑
              strategies = {
                  "vector_coverage": {
                      "action": "더 많은 벡터를 시도하도록 Brain 전략 조정",
                      "env_hint": "VXIS_STRATEGY=aggressive_coverage",
                  },
                  "exploitation_reach": {
                      "action": "L2+ 도달을 위해 익스플로잇 체인 강화",
                      "env_hint": "VXIS_STRATEGY=deep_exploit",
                  },
                  "chain_intelligence": {
                      "action": "발견 간 연결점 탐색 강화, 피벗 로직 활성화",
                      "env_hint": "VXIS_STRATEGY=chain_focus",
                  },
                  "finding_precision": {
                      "action": "FP 필터 강화, 증거 수집 로직 활성화",
                      "env_hint": "VXIS_STRATEGY=precision_mode",
                  },
                  "completeness": {
                      "action": "스킵된 Phase 재시도, 타임아웃 증가",
                      "env_hint": "VXIS_STRATEGY=full_coverage",
                  },
              }

              strategy = strategies.get(weakest_dim, {})
              if strategy:
                  # 환경변수로 전략 힌트 전달 (다음 벤치마크에서 Brain이 참고)
                  os.environ["VXIS_GROWTH_STRATEGY"] = strategy.get("env_hint", "")
                  print(f"  [IMPROVE] 전략 조정: {strategy['action']}")
                  return strategy["action"]
              return "개선 전략 없음"

          # ═══════════════════════════════════════════════════════════
          #  메인 루프: 측정 → 분석 → 개선 → 재측정 (최대 N회)
          # ═══════════════════════════════════════════════════════════

          now = datetime.now(timezone.utc)
          stop_label = f"06:00 KST (21:00 UTC)" if MAX_ITERATIONS is None else f"최대 {MAX_ITERATIONS}회"
          print(f"\n{'#'*60}")
          print(f"  VXIS Growth Loop — {now.strftime('%Y-%m-%d %H:%M')} UTC")
          print(f"  종료 조건: {stop_label}")
          print(f"{'#'*60}\n")

          prev_best = 0
          iteration = 0

          def _should_continue():
              """계속 돌릴지 판단."""
              if MAX_ITERATIONS is not None:
                  return iteration < MAX_ITERATIONS
              utc_now = datetime.now(timezone.utc)
              return utc_now.hour < STOP_HOUR_UTC or (utc_now.hour == STOP_HOUR_UTC and utc_now.minute == 0)

          while _should_continue():
              iteration += 1
              iter_label = f"{iteration}" if MAX_ITERATIONS is None else f"{iteration}/{MAX_ITERATIONS}"
              time_left = ""
              if MAX_ITERATIONS is None:
                  utc_now = datetime.now(timezone.utc)
                  mins_left = (STOP_HOUR_UTC - utc_now.hour) * 60 - utc_now.minute
                  time_left = f" | 남은시간 ~{mins_left}분"
              print(f"\n{'='*60}")
              print(f"  ITERATION {iter_label}{time_left}")
              print(f"{'='*60}")

              iter_results = []

              for target_name, target_url in targets:
                  print(f"\n  --- {target_name} ---")
                  result = run_benchmark(target_name, target_url)
                  iter_results.append(result)

                  if "error" not in result:
                      print(f"  Score: {result['total']:.1f} [{result['grade']}] (delta: {result.get('delta',0):+.1f})")

                      # 히스토리 기록
                      history.append({
                          "date": now.strftime("%Y-%m-%d"),
                          "iteration": iteration,
                          "target_name": target_name,
                          "target_type": "web",
                          "total": result["total"],
                          "grade": result["grade"],
                          "dimensions": result["dimensions"],
                          "delta": result.get("delta", 0),
                      })

                      # baseline 업데이트 (점수 오르면)
                      if result.get("comparison") and result["comparison"].total_delta > 0:
                          result["runner"].save_baseline(result["score_obj"])
                          print(f"  Baseline updated!")
                  else:
                      print(f"  ERROR: {result['error']}")

              # 이번 반복의 최고 점수
              valid_results = [r for r in iter_results if "error" not in r]
              if not valid_results:
                  print("\n  [STOP] 모든 타겟 실패 — 루프 중단")
                  break

              current_best = max(r["total"] for r in valid_results)
              best_result = max(valid_results, key=lambda r: r["total"])

              # 약점 분석
              weakest_dim, weakest_pct = find_weakest_dimension(best_result)
              dim_names_ko = {
                  "vector_coverage": "벡터 커버리지",
                  "exploitation_reach": "공격 깊이",
                  "chain_intelligence": "체인 지능",
                  "finding_precision": "발견 정확도",
                  "completeness": "완전성",
              }

              print(f"\n  Best: {current_best:.1f} | Weakest: {dim_names_ko.get(weakest_dim, '?')} ({weakest_pct:.0%})")

              # iteration 기록 — 상세 스텝 로그
              iter_log = {
                  "iteration": iteration,
                  "timestamp": datetime.now(timezone.utc).isoformat(),
                  "best_score": current_best,
                  "weakest_dimension": weakest_dim,
                  "weakest_pct": round(weakest_pct, 2),
                  "all_dimensions": best_result.get("dimensions", {}),
                  "results_per_target": [
                      {
                          "target": r.get("target", "?"),
                          "score": r.get("total", 0),
                          "grade": r.get("grade", "?"),
                          "dimensions": r.get("dimensions", {}),
                          "error": r.get("error", ""),
                      }
                      for r in iter_results
                  ],
              }

              # 개선 여부 판단
              improvement = current_best - prev_best
              iter_log["improvement"] = round(improvement, 1)

              if improvement <= 0 and iteration > 1:
                  print(f"  [PLATEAU] 개선 없음 — 계속 시도")
              elif iteration > 1:
                  print(f"  [GROWTH] +{improvement:.1f}점 성장!")

              # 횟수 제한 모드에서만 마지막 반복 체크
              if MAX_ITERATIONS is not None and iteration >= MAX_ITERATIONS:
                  iter_log["action"] = "max_iterations_reached"
                  iterations.append(iter_log)
                  break

              # 개선 시도
              action = analyze_and_improve(weakest_dim, iteration)
              iter_log["action"] = action
              iterations.append(iter_log)

              prev_best = current_best

              # 다음 반복 전 잠시 대기 (리소스 안정화)
              print(f"\n  [WAIT] 30초 후 다음 반복...")
              time.sleep(30)

          # ═══ 최종 결과 저장 ═══

          # 히스토리 정리 (최대 365일)
          if len(history) > 365:
              history[:] = history[-365:]
          HISTORY_FILE.write_text(json.dumps(history, indent=2))

          # Iteration 로그 저장
          ITERATION_LOG.write_text(json.dumps({
              "date": now.strftime("%Y-%m-%d"),
              "total_iterations": len(iterations),
              "start_score": iterations[0]["best_score"] if iterations else 0,
              "final_score": iterations[-1]["best_score"] if iterations else 0,
              "total_growth": round(
                  (iterations[-1]["best_score"] - iterations[0]["best_score"]) if len(iterations) >= 2 else 0, 1
              ),
              "iterations": iterations,
          }, indent=2, ensure_ascii=False))

          # ═══ 상세 마크다운 리포트 (전체 스텝 볼 수 있게) ═══
          STEP_REPORT = Path("tools/benchmark/nightly_steps.md")
          dim_names_ko = {
              "vector_coverage": "벡터 커버리지",
              "exploitation_reach": "공격 깊이",
              "chain_intelligence": "체인 지능",
              "finding_precision": "발견 정확도",
              "completeness": "완전성",
          }
          dim_max = {
              "vector_coverage": 250, "exploitation_reach": 300,
              "chain_intelligence": 150, "finding_precision": 200,
              "completeness": 100,
          }

          md = [
              f"# Nightly Growth Steps — {now.strftime('%Y-%m-%d')}",
              "",
              f"**반복 횟수:** {len(iterations)}",
          ]
          if iterations:
              start_s = iterations[0]["best_score"]
              final_s = iterations[-1]["best_score"]
              md.append(f"**시작:** {start_s:.1f}점 → **최종:** {final_s:.1f}점 (**{final_s - start_s:+.1f}점**)")
          md.append("")

          # 반복별 상세 테이블
          md.append("## Step-by-Step")
          md.append("")
          md.append("| # | 점수 | 등급 | 변화 | 약점 | 약점% | 전략 |")
          md.append("|---|------|------|------|------|-------|------|")

          for it in iterations:
              weak_ko = dim_names_ko.get(it.get("weakest_dimension", ""), "?")
              wpct = it.get("weakest_pct", 0)
              imp = it.get("improvement", 0)
              imp_icon = "📈" if imp > 0 else ("📉" if imp < 0 else "➡️")
              action = it.get("action", "")[:30]
              md.append(
                  f"| {it['iteration']} | {it['best_score']:.1f} | "
                  f"— | {imp_icon} {imp:+.1f} | {weak_ko} | {wpct:.0%} | {action} |"
              )

          md.append("")

          # 각 반복의 차원별 상세
          md.append("## Dimension Breakdown per Iteration")
          md.append("")
          for it in iterations:
              md.append(f"### Iteration {it['iteration']} — {it['best_score']:.1f}점")
              dims = it.get("all_dimensions", {})
              if dims:
                  md.append("| 차원 | 점수 | 최대 | % | |")
                  md.append("|------|------|------|---|---|")
                  for dk, dv in dims.items():
                      dmax = dim_max.get(dk, 100)
                      pct = dv / dmax if dmax else 0
                      bar = "🟢" if pct >= 0.7 else ("🟡" if pct >= 0.4 else "🔴")
                      md.append(f"| {dim_names_ko.get(dk, dk)} | {dv:.1f} | {dmax} | {pct:.0%} | {bar} |")
                  md.append("")

              # 타겟별 결과
              for tr in it.get("results_per_target", []):
                  if tr.get("error"):
                      md.append(f"- **{tr['target']}**: ❌ {tr['error'][:50]}")
                  else:
                      md.append(f"- **{tr['target']}**: {tr.get('score', 0):.1f}점 [{tr.get('grade', '?')}]")
              md.append("")

          STEP_REPORT.write_text("\n".join(md), encoding="utf-8")

          print(f"\n{'#'*60}")
          print(f"  Growth Loop 완료")
          print(f"  반복: {len(iterations)}회")
          if iterations:
              print(f"  시작: {iterations[0]['best_score']:.1f}")
              print(f"  최종: {iterations[-1]['best_score']:.1f}")
              growth = iterations[-1]['best_score'] - iterations[0]['best_score']
              print(f"  성장: {growth:+.1f}점")
              print(f"  상세 리포트: {STEP_REPORT}")
          print(f"{'#'*60}")
          PYEOF

      - name: Compare and judge
        id: judge
        env:
          PYTHONPATH: src
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PYEOF'
          import json, os, subprocess
          from pathlib import Path
          from datetime import datetime, timedelta, timezone

          HISTORY_FILE = Path("tools/benchmark/score_history.json")
          VERDICT_FILE = Path("tools/benchmark/verdict.json")

          if not HISTORY_FILE.exists():
              print("No history — skip comparison")
              exit(0)

          history = json.loads(HISTORY_FILE.read_text())
          if len(history) < 2:
              print("Not enough data for comparison")
              exit(0)

          now = datetime.now(timezone.utc)
          today = now.strftime("%Y-%m-%d")
          yesterday = (now - timedelta(days=1)).strftime("%Y-%m-%d")

          # 오늘 vs 어제 비교 (같은 타겟)
          today_entries = [e for e in history if e.get("date") == today and not e.get("error")]
          yesterday_entries = [e for e in history if e.get("date") == yesterday and not e.get("error")]

          if not today_entries:
              print("No today entries — skip")
              exit(0)

          # 최근 머지된 커밋 조회 (오늘 반영된 변경사항)
          recent_commits = []
          try:
              result = subprocess.run(
                  ["git", "log", "--oneline", "--since=24 hours ago", "--format=%h %s"],
                  capture_output=True, text=True, timeout=10,
              )
              recent_commits = result.stdout.strip().split("\n") if result.stdout.strip() else []
          except Exception:
              pass

          # 타겟별 비교
          verdicts = []
          for today_e in today_entries:
              target_name = today_e.get("target_name", "unknown")
              today_score = today_e.get("total", 0)

              # 어제 같은 타겟 찾기
              prev = [e for e in yesterday_entries if e.get("target_name") == target_name]
              if not prev:
                  # 어제 데이터 없으면 전체 이전 데이터에서 같은 타겟 최근값
                  prev = [e for e in history[:-len(today_entries)]
                          if e.get("target_name") == target_name and not e.get("error")]
              if not prev:
                  verdicts.append({
                      "target": target_name,
                      "today": today_score,
                      "previous": 0,
                      "delta": 0,
                      "verdict": "first_run",
                  })
                  continue

              prev_score = prev[-1].get("total", 0)
              delta = today_score - prev_score

              if delta > 5:
                  verdict = "improved"
              elif delta < -5:
                  verdict = "regressed"
              else:
                  verdict = "stable"

              verdicts.append({
                  "target": target_name,
                  "today": today_score,
                  "previous": prev_score,
                  "delta": round(delta, 1),
                  "verdict": verdict,
              })

          # 최종 판정
          regressions = [v for v in verdicts if v["verdict"] == "regressed"]
          improvements = [v for v in verdicts if v["verdict"] == "improved"]

          verdict_summary = {
              "date": today,
              "verdicts": verdicts,
              "recent_commits": recent_commits[:10],
              "overall": "regressed" if regressions else ("improved" if improvements else "stable"),
          }
          VERDICT_FILE.write_text(json.dumps(verdict_summary, indent=2, ensure_ascii=False))

          print(f"\n{'='*50}")
          print(f"  VERDICT — {today}")
          print(f"{'='*50}")
          for v in verdicts:
              icon = {"improved": "📈", "regressed": "📉", "stable": "➡️", "first_run": "🆕"}[v["verdict"]]
              print(f"  {icon} {v['target']}: {v['today']:.1f} (delta: {v['delta']:+.1f}) → {v['verdict'].upper()}")

          if recent_commits:
              print(f"\n  최근 커밋 ({len(recent_commits)}건):")
              for c in recent_commits[:5]:
                  print(f"    {c}")

          # Regression 발견 시 GitHub Issue 생성
          if regressions:
              print(f"\n  ⚠️ REGRESSION in {len(regressions)} target(s)")
              reg_details = "\n".join(
                  f"- **{r['target']}**: {r['previous']:.1f} → {r['today']:.1f} ({r['delta']:+.1f})"
                  for r in regressions
              )
              commits_str = "\n".join(f"- `{c}`" for c in recent_commits[:10]) if recent_commits else "- 커밋 정보 없음"

              issue_body = f"""## Growth Loop — Regression 감지

### 점수 하락

{reg_details}

### 최근 커밋 (원인 후보)

{commits_str}

### 판정

코드 변경 후 벤치마크 점수가 하락했습니다.
다음 중 하나를 결정해야 합니다:

- [ ] **Revert**: 원인 커밋을 되돌림
- [ ] **Fix**: 하락 원인을 분석하고 수정
- [ ] **Accept**: 의도된 변경 (예: 오탐 필터 강화로 일시적 하락)

---
*VXIS Growth Loop 자동 생성*"""

              try:
                  subprocess.run(
                      ["gh", "issue", "create",
                       "--title", f"[Growth] Regression detected — {', '.join(r['target'] for r in regressions)}",
                       "--body", issue_body,
                       "--label", "regression,growth-loop,automated"],
                      capture_output=True, text=True, timeout=30,
                  )
                  print("  → Regression Issue 생성됨")
              except Exception as e:
                  print(f"  → Issue 생성 실패: {e}")

          elif improvements:
              print(f"\n  ✅ IMPROVED in {len(improvements)} target(s) — 코드 변경 효과 확인")

          PYEOF

      - name: Generate growth report
        id: report
        env:
          PYTHONPATH: src
        run: |
          python - <<'PYEOF'
          import json, os
          from pathlib import Path
          from datetime import datetime, timezone

          HISTORY_FILE = Path("tools/benchmark/score_history.json")
          REPORT_FILE = Path("tools/benchmark/growth_report.md")
          VERDICT_FILE = Path("tools/benchmark/verdict.json")

          if not HISTORY_FILE.exists():
              print("No history yet")
              exit(0)

          history = json.loads(HISTORY_FILE.read_text())
          if not history:
              exit(0)

          now = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          latest = history[-1]

          # Verdict 로드
          verdict = {}
          if VERDICT_FILE.exists():
              verdict = json.loads(VERDICT_FILE.read_text())

          # 성장 추이 계산
          lines = [
              "# VXIS Growth Report",
              f"**Date:** {now}",
              f"**Overall Verdict:** {verdict.get('overall', 'unknown').upper()}",
              f"**Latest Score:** {latest.get('total', 0):.1f} / 1000 [{latest.get('grade', '?')}]",
              "",
              "## Score History",
              "",
              "| Date | Score | Grade | Delta | Trend |",
              "|------|-------|-------|-------|-------|",
          ]

          for i, entry in enumerate(history[-12:]):  # 최근 12주
              delta = entry.get("delta", 0)
              trend = "📈" if delta > 0 else ("📉" if delta < 0 else "➡️")
              error = f" ⚠️ {entry['error'][:30]}" if entry.get("error") else ""
              lines.append(
                  f"| {entry['date']} | {entry.get('total', 0):.1f} | "
                  f"{entry.get('grade', '?')} | {delta:+.1f} | {trend}{error} |"
              )

          # 약점 분석
          if "dimensions" in latest:
              dims = latest["dimensions"]
              lines.extend([
                  "",
                  "## Dimension Breakdown (Latest)",
                  "",
                  "| Dimension | Score | Max | % | Status |",
                  "|-----------|-------|-----|---|--------|",
              ])
              dim_config = [
                  ("Vector Coverage", "vector_coverage", 250),
                  ("Exploitation Reach", "exploitation_reach", 300),
                  ("Chain Intelligence", "chain_intelligence", 150),
                  ("Finding Precision", "finding_precision", 200),
                  ("Completeness", "completeness", 100),
              ]
              weakest = None
              weakest_pct = 1.0
              for name, key, max_score in dim_config:
                  score = dims.get(key, 0)
                  pct = score / max_score if max_score else 0
                  status = "🟢" if pct >= 0.7 else ("🟡" if pct >= 0.4 else "🔴")
                  lines.append(f"| {name} | {score:.1f} | {max_score} | {pct:.0%} | {status} |")
                  if pct < weakest_pct:
                      weakest_pct = pct
                      weakest = (name, key, pct)

              if weakest:
                  lines.extend([
                      "",
                      f"## Weakest Dimension: {weakest[0]} ({weakest[2]:.0%})",
                      "",
                      "**다음 주 개선 포인트:**",
                  ])
                  improvement_tips = {
                      "vector_coverage": "- 더 많은 공격 벡터를 시도하도록 에이전트 확장\n- 누락된 벡터 카테고리 확인 (injection, auth, crypto 등)",
                      "exploitation_reach": "- L2+ 도달률을 높이기 위해 익스플로잇 로직 강화\n- Chain Reasoner로 더 깊은 공격 경로 탐색",
                      "chain_intelligence": "- 체인 깊이를 늘리기 위해 피벗/횡이동 로직 추가\n- 발견된 취약점 간 연결점 탐색 강화",
                      "finding_precision": "- FP 필터링 파이프라인 개선\n- 증거 수집 로직 강화 (evidence 2개 이상)",
                      "completeness": "- 실패/스킵되는 Phase 원인 분석\n- 도구 설치/환경 문제 해결",
                  }
                  lines.append(improvement_tips.get(weakest[1], "- 해당 차원 코드 리뷰 필요"))

          # 성장률 계산
          if len(history) >= 2:
              first = history[0].get("total", 0)
              last = latest.get("total", 0)
              growth = last - first
              weeks = len(history)
              lines.extend([
                  "",
                  f"## Growth Summary",
                  f"- **총 성장:** {growth:+.1f}점 ({weeks}주간)",
                  f"- **주간 평균 성장:** {growth / max(weeks, 1):+.1f}점/주",
              ])

          REPORT_FILE.write_text("\n".join(lines), encoding="utf-8")
          print(f"Growth report saved: {REPORT_FILE}")

          # GitHub Actions output
          with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as f:
              f.write(f"score={latest.get('total', 0):.1f}\n")
              f.write(f"grade={latest.get('grade', '?')}\n")
          PYEOF

      - name: Commit score history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/benchmark/ 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: growth loop — score update $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi

      - name: Send morning report (아침에 컨펌용)
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PYEOF'
          import json, os, urllib.request
          from pathlib import Path

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          if not token or not chat_id:
              print("Telegram not configured")
              exit(0)

          # Iteration 로그에서 밤새 성장 결과 로드
          iter_file = Path("tools/benchmark/iteration_log.json")
          if not iter_file.exists():
              exit(0)

          data = json.loads(iter_file.read_text())
          total_iter = data.get("total_iterations", 0)
          start = data.get("start_score", 0)
          final = data.get("final_score", 0)
          growth = data.get("total_growth", 0)

          if growth > 0:
              icon = "📈"
              status = "성장"
          elif growth < 0:
              icon = "📉"
              status = "하락"
          else:
              icon = "➡️"
              status = "변화없음"

          # 각 반복의 약점 변화 추적
          iter_details = ""
          for it in data.get("iterations", [])[-5:]:
              dim_ko = {
                  "vector_coverage": "벡터", "exploitation_reach": "깊이",
                  "chain_intelligence": "체인", "finding_precision": "정확도",
                  "completeness": "완전성",
              }
              weak = dim_ko.get(it.get("weakest_dimension", ""), "?")
              iter_details += f"\n  #{it['iteration']}: {it['best_score']:.0f}점 (약점: {weak} {it.get('weakest_pct',0):.0%})"

          # Verdict 로드
          verdict_file = Path("tools/benchmark/verdict.json")
          verdict_msg = ""
          if verdict_file.exists():
              v = json.loads(verdict_file.read_text())
              overall = v.get("overall", "unknown")
              verdict_icon = {"improved": "✅ 반영 확정", "regressed": "⚠️ REGRESSION", "stable": "➡️ 안정"}.get(overall, "❓")
              verdict_msg = f"\n\n📋 <b>판정:</b> {verdict_icon}"

          msg = (
              f"🌙 <b>VXIS 밤새 성장 리포트</b>\n"
              f"\n"
              f"🔄 <b>반복:</b> {total_iter}회\n"
              f"🏁 <b>시작:</b> {start:.0f}점\n"
              f"🏆 <b>최종:</b> {final:.0f}점\n"
              f"{icon} <b>{status}:</b> {growth:+.1f}점\n"
              f"\n<b>반복 로그:</b>{iter_details}"
              f"{verdict_msg}\n"
              f"\n💡 <i>코드 변경이 필요하면 승인해주세요</i>"
          )

          payload = json.dumps({
              "chat_id": chat_id,
              "text": msg,
              "parse_mode": "HTML",
          }).encode("utf-8")

          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              urllib.request.urlopen(req, timeout=15)
              print("Morning report sent")
          except Exception as e:
              print(f"Telegram failed: {e}")
          PYEOF
