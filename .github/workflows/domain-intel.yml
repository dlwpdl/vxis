name: Domain Intelligence

on:
  schedule:
    # Bootstrap mode: weekly only (reduced from daily + weekly + monthly + ...)
    # Full vision schedule restored once revenue arrives
    - cron: "0 1 * * 1"  # Monday 01:00 UTC (10:00 KST) — weekly batch

  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드"
        required: false
        default: "daily"
        type: choice
        options:
          - daily
          - weekly
          - monthly
          - quarterly
          - yearly
      collect_only:
        description: "수집만 (LLM 분석 없이)"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  domain-intel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Determine mode
        id: mode
        run: |
          # 수동 실행이면 입력값 사용
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            # cron 스케줄에 따라 모드 결정
            HOUR=$(date -u +%H)
            DAY=$(date -u +%d)
            MONTH=$(date -u +%m)

            if [ "$HOUR" = "04" ] && [ "$DAY" = "01" ] && [ "$MONTH" = "01" ]; then
              echo "mode=yearly" >> "$GITHUB_OUTPUT"
            elif [ "$HOUR" = "03" ] && [ "$DAY" = "01" ]; then
              echo "mode=quarterly" >> "$GITHUB_OUTPUT"
            elif [ "$HOUR" = "02" ] && [ "$DAY" = "01" ]; then
              echo "mode=monthly" >> "$GITHUB_OUTPUT"
            elif [ "$HOUR" = "01" ]; then
              echo "mode=weekly" >> "$GITHUB_OUTPUT"
            else
              echo "mode=daily" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "Determined mode: $(grep mode "$GITHUB_OUTPUT")"

      - name: Run Domain Intelligence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          ARGS=(--mode "$MODE")

          if [ "${{ github.event.inputs.collect_only }}" = "true" ]; then
            ARGS=(--collect-only)
          fi

          echo "실행: python -m tools.domain_intel ${ARGS[*]}"
          python -m tools.domain_intel "${ARGS[@]}"

      - name: Archive results
        uses: actions/upload-artifact@v4
        with:
          name: domain-intel-results
          path: |
            tools/domain_intel/digests/
            tools/domain_intel/signals_cache/
          if-no-files-found: ignore

      # Growth Layer integration: export digest CVEs as JSONL signals
      - name: Export CVEs to signal inbox
        if: always()
        run: |
          python - <<'PYEOF'
          import json, re
          from pathlib import Path
          from datetime import datetime, timezone

          digests_dir = Path("tools/domain_intel/digests")
          if not digests_dir.exists():
              exit(0)
          digests = sorted(digests_dir.glob("*.md"), reverse=True)
          if not digests:
              exit(0)

          latest = digests[0]
          content = latest.read_text(encoding="utf-8")
          now = datetime.now(timezone.utc).isoformat()

          # Extract CVEs and their descriptions from the markdown
          signals = []
          # Match patterns like: **CVE-2026-XXXXX** — Description
          for match in re.finditer(
              r'\*\*(CVE-\d{4}-\d+)\*\*\s*[—–-]\s*(.+?)(?:\n|$)', content
          ):
              cve_id = match.group(1)
              desc = match.group(2).strip()
              signals.append({
                  "signal_id": f"domain-intel-{cve_id}",
                  "source": {
                      "name": "domain_intel",
                      "url": "internal://domain-intel",
                      "source_type": "internal",
                      "trust_score": 0.95,
                  },
                  "timestamp": now,
                  "title": f"{cve_id}: {desc[:100]}",
                  "body": "",
                  "url": f"https://nvd.nist.gov/vuln/detail/{cve_id}",
                  "metadata": {
                      "description": desc,
                      "source": "domain_intel_digest",
                      "cve": cve_id,
                  },
              })

          if signals:
              inbox = Path(".vxis/signals/inbox")
              inbox.mkdir(parents=True, exist_ok=True)
              out = inbox / f"ingest-domain-intel-{datetime.now(timezone.utc).strftime('%Y-%m-%dT%H')}.jsonl"
              with out.open("w") as f:
                  for s in signals:
                      f.write(json.dumps(s, ensure_ascii=False) + "\n")
              print(f"Exported {len(signals)} CVE signals from {latest.name}")
          else:
              print(f"No CVEs found in {latest.name}")
          PYEOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f .vxis/signals/inbox/ 2>/dev/null || true
          if git diff --cached --quiet -- .vxis/signals/inbox; then
            echo "No domain-intel signal inbox changes"
          else
            git commit -m "chore: domain-intel signal inbox $(date -u +%Y-%m-%dT%H)"
            git pull --rebase origin main
            git push
          fi

      - name: Archive exported CVE signals
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domain-intel-signal-inbox
          path: .vxis/signals/inbox/
          if-no-files-found: ignore
