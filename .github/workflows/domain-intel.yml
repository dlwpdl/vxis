name: Domain Intelligence

on:
  # 주 1회 — 월요일 00:00 UTC
  schedule:
    - cron: "0 0 * * 1"

  # 수동 실행
  workflow_dispatch:
    inputs:
      collect_only:
        description: "수집만 (LLM 분석 없이)"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  domain-intel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Domain Intelligence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.collect_only }}" = "true" ]; then
            ARGS="--collect-only"
          fi
          python -m tools.domain_intel $ARGS

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/domain_intel/digests/ tools/domain_intel/signals_cache/ 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: domain intelligence report $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
