name: VXIS Benchmark

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/benchmark.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/vxis/**"
      - "tests/**"
      - "infra/benchmarks/**"
      - "tools/benchmark/**"
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  deterministic:
    name: Deterministic Benchmark Contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run deterministic benchmark tier
        env:
          PYTHONPATH: src
        run: |
          uv run pytest -m "not live" \
            tests/scoring \
            tests/unit/test_scan_profiles.py \
            tests/unit/test_config.py \
            tests/integration/test_smoke.py::test_config_loads

  live-benchmark:
    name: Live Juice Shop Benchmark
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    strategy:
      matrix:
        target_type: [web]
      fail-fast: false

    services:
      juice-shop:
        image: bkimminich/juice-shop
        ports:
          - 3000:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --locked --extra dev --extra browser

      - name: Install browser runtime
        run: uv run playwright install --with-deps chromium

      - name: Wait for Juice Shop
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3000 >/dev/null; then
              echo "Juice Shop is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Juice Shop did not become ready" >&2
          exit 1

      - name: Run live benchmark scan
        id: run_benchmark
        env:
          PYTHONPATH: src
          VXIS_BRAIN_MODE: api
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VXIS_SCAN_PROFILE: crown
          VXIS_BENCHMARK_TARGET_JUICE_SHOP: ${{ vars.BENCHMARK_TARGET_JUICE_SHOP || 'http://localhost:3000' }}
        run: |
          uv run python -m vxis.scoring.benchmark_cli \
            --manifest infra/benchmarks/league-v2-smoke.json \
            --baseline tools/benchmark/baseline.json \
            --output benchmark_result_${{ matrix.target_type }}.json \
            --target-type ${{ matrix.target_type }} \
            --profile crown

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.target_type }}
          path: benchmark_result_${{ matrix.target_type }}.json
          retention-days: 30

  live-gate:
    name: Live Regression Gate
    runs-on: ubuntu-latest
    needs: live-benchmark
    if: always() && github.event_name != 'pull_request'

    steps:
      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-results-*
          merge-multiple: true

      - name: Evaluate live regression gate
        run: |
          python - <<'EOF'
          import json
          import sys
          from pathlib import Path

          results = [json.loads(path.read_text()) for path in Path(".").glob("benchmark_result_*.json")]
          if not results:
              print("No live benchmark results found")
              sys.exit(1)

          regressions = [item for item in results if not item.get("skipped") and item.get("regression")]
          if regressions:
              print(f"REGRESSION GATE FAILED - {len(regressions)} target type(s) regressed")
              sys.exit(1)

          print("Live regression gate PASSED")
          EOF
