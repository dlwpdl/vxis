name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "20 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: >-
            Apache-2.0,
            BSD-2-Clause,
            BSD-3-Clause,
            ISC,
            MIT,
            MPL-2.0,
            Python-2.0

  python-security:
    name: Python Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      # Proxy/X-Ray depends on mitmproxy. The fixed mitmproxy line currently
      # conflicts with openai-agents/pydantic on Python 3.12, so proxy is audited
      # separately when that upstream constraint is resolvable.
      - run: uv export --locked --extra dev --extra dashboard --extra export --extra pdf --extra browser --no-hashes --no-emit-project -o requirements-audit.txt
      - run: >
          uv run --with pip-audit pip-audit -r requirements-audit.txt --strict
          --ignore-vuln CVE-2025-43859
          --ignore-vuln CVE-2025-6176
          --ignore-vuln PYSEC-2026-35
          --ignore-vuln CVE-2026-26007
      - run: uv run --with bandit bandit -r src/vxis -ll -ii --baseline .bandit-baseline.json

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
