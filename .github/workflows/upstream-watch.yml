name: Upstream Watch

on:
  # Every 6 hours — stay close to upstream changes
  schedule:
    - cron: "0 */6 * * *"

  # Manual trigger with options
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly
          - discovery
      repo:
        description: "Filter to specific repo (e.g., usestrix/strix). Leave empty for all."
        required: false
        type: string
      dry_run:
        description: "Dry run (no notifications)"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  issues: write

jobs:
  daily-watch:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: |
            tools/upstream_watch/.state.json
            tools/upstream_watch/.metrics_history.json
            tools/upstream_watch/.telegram_state.json
            tools/upstream_watch/decisions.json
          key: upstream-watch-state-${{ github.run_id }}
          restore-keys: |
            upstream-watch-state-

      - name: Run daily watch
        env:
          UPSTREAM_LLM_PROVIDER: ${{ vars.UPSTREAM_LLM_PROVIDER || 'together' }}
          UPSTREAM_LLM_MODEL: ${{ vars.UPSTREAM_LLM_MODEL || '' }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VXIS_SLACK_WEBHOOK: ${{ secrets.VXIS_SLACK_WEBHOOK }}
        run: |
          ARGS="--mode daily"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.repo }}" ]; then
            ARGS="$ARGS --repo ${{ github.event.inputs.repo }}"
          fi
          python -m tools.upstream_watch $ARGS

      - name: Commit digest and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/upstream_watch/digests/ tools/upstream_watch/.state.json \
                  tools/upstream_watch/.metrics_history.json \
                  tools/upstream_watch/.telegram_state.json \
                  tools/upstream_watch/proposals/ \
                  tools/upstream_watch/decisions.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: upstream watch digest $(date -u +%Y-%m-%dT%H:%M)"
            git pull --rebase origin main
            git push
          fi

      - name: Create issue for high-priority items
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_FILE=$(ls -t tools/upstream_watch/digests/issue-*.md 2>/dev/null | head -1)
          if [ -n "$ISSUE_FILE" ] && [ -s "$ISSUE_FILE" ]; then
            gh issue create \
              --title "Upstream Watch: $(date -u +%Y-%m-%d) — High-priority items" \
              --body-file "$ISSUE_FILE" \
              --label "upstream-watch,triage"
          fi

  weekly-digest:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'weekly'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run weekly digest
        run: python -m tools.upstream_watch --mode weekly

      - name: Commit weekly digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/upstream_watch/digests/ || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: upstream watch weekly digest $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi

  # Weekly digest auto-trigger every Sunday
  weekly-auto:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    needs: daily-watch
    steps:
      - name: Check if Sunday
        id: check-day
        run: |
          DAY=$(date -u +%u)
          echo "is_sunday=$( [ $DAY -eq 7 ] && echo true || echo false )" >> $GITHUB_OUTPUT

      - name: Checkout
        if: steps.check-day.outputs.is_sunday == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        if: steps.check-day.outputs.is_sunday == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run weekly digest
        if: steps.check-day.outputs.is_sunday == 'true'
        run: python -m tools.upstream_watch --mode weekly

      - name: Commit weekly digest
        if: steps.check-day.outputs.is_sunday == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/upstream_watch/digests/ || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: upstream watch weekly digest $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
