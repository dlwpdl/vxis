name: Upstream Watch

on:
  schedule:
    # 매주 월요일 02:00 UTC — 주간 배치 분석
    - cron: "0 2 * * 1"

  workflow_dispatch:
    inputs:
      repo:
        description: "Filter to specific repo (e.g., usestrix/strix). Leave empty for all."
        required: false
        type: string
      dry_run:
        description: "Dry run (no notifications)"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  issues: write

jobs:
  weekly-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: |
            tools/upstream_watch/.state.json
            tools/upstream_watch/.metrics_history.json
            tools/upstream_watch/.telegram_state.json
            tools/upstream_watch/decisions.json
          key: upstream-watch-state-${{ github.run_id }}
          restore-keys: |
            upstream-watch-state-

      - name: Run weekly watch
        env:
          UPSTREAM_LLM_PROVIDER: ${{ vars.UPSTREAM_LLM_PROVIDER || 'together' }}
          UPSTREAM_LLM_MODEL: ${{ vars.UPSTREAM_LLM_MODEL || 'moonshotai/Kimi-K2.5' }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VXIS_SLACK_WEBHOOK: ${{ secrets.VXIS_SLACK_WEBHOOK }}
        run: |
          ARGS="--mode weekly"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.repo }}" ]; then
            ARGS="$ARGS --repo ${{ github.event.inputs.repo }}"
          fi
          python -m tools.upstream_watch $ARGS

      - name: Commit digest and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for p in \
            tools/upstream_watch/digests/ \
            tools/upstream_watch/.state.json \
            tools/upstream_watch/.metrics_history.json \
            tools/upstream_watch/.telegram_state.json \
            tools/upstream_watch/proposals/ \
            tools/upstream_watch/decisions.json; do
            [ -e "$p" ] && git add "$p" 2>/dev/null || true
          done
          if ! git diff --staged --quiet; then
            git commit -m "chore: upstream watch weekly digest $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi

      - name: Create issue for high-priority items
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_FILE=$(ls -t tools/upstream_watch/digests/issue-*.md 2>/dev/null | head -1)
          if [ -n "$ISSUE_FILE" ] && [ -s "$ISSUE_FILE" ]; then
            gh issue create \
              --title "Upstream Watch: $(date -u +%Y-%m-%d) — High-priority items" \
              --body-file "$ISSUE_FILE" \
              --label "upstream-watch,triage"
          fi
