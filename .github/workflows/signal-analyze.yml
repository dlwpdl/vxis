name: Signal Analyze

on:
  schedule:
    # Bootstrap mode: twice daily at 00:00 and 12:00 UTC (reduced from every 2h)
    - cron: "0 0,12 * * *"
  workflow_dispatch:
    inputs:
      force_apply:
        description: "Force apply proposals (override dry-run)"
        required: false
        default: "false"
        type: string
  repository_dispatch:
    types: [manual-analyze]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  issues: write

jobs:
  analyze:
    name: LLM analysis + proposal generation
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install VXIS
        run: |
          pip install -e . 2>/dev/null || true
          echo "PYTHONPATH=src" >> $GITHUB_ENV

      - name: Run analysis + proposal generation
        id: analyze
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VXIS_BRAIN_MODE: api
        run: |
          python - <<'PYEOF'
          import json
          from pathlib import Path
          from vxis.growth.ingest import INBOX_DIR
          from vxis.growth.schemas import RawSignal, SignalSource
          from vxis.growth.analyze import analyze_batch
          from vxis.growth.apply import generate_proposals, apply_proposals

          import shutil

          # Load ALL signals from inbox
          if not INBOX_DIR.exists():
              print("No inbox directory yet")
              exit(0)

          inbox_files = sorted(INBOX_DIR.glob("ingest-*.jsonl"))
          signals = []
          for f in inbox_files:
              try:
                  with f.open() as fh:
                      for line in fh:
                          try:
                              data = json.loads(line)
                              src = SignalSource(**data["source"])
                              data["source"] = src
                              signals.append(RawSignal(**data))
                          except Exception as e:
                              print(f"skip malformed: {e}")
              except Exception:
                  continue

          print(f"Loaded {len(signals)} signals from {len(inbox_files)} files")
          if not signals:
              print("No signals to analyze")
              with open("_analyze_result.json", "w") as f:
                  json.dump({"total": 0, "auto_applied": 0, "pending_review": 0, "dry_run": True}, f)
              exit(0)

          # Analyze with configured batch_size (dry-run by default in bootstrap config)
          from vxis.growth.config import load_bootstrap_config
          config = load_bootstrap_config()
          batch_size = int(config["filtering"]["batch_size"])
          intels = analyze_batch(signals[:batch_size])
          print(f"Extracted {len(intels)} intelligence records")

          # Generate proposals
          all_proposals = []
          for intel in intels:
              all_proposals.extend(generate_proposals(intel))
          print(f"Generated {len(all_proposals)} proposals")

          # Apply (dry-run stores in pending/)
          result = apply_proposals(all_proposals)
          print(f"Applied: {result}")

          with open("_analyze_result.json", "w") as f:
              json.dump(result, f)

          # Move processed inbox files to processed/
          processed_dir = Path(".vxis/signals/processed")
          processed_dir.mkdir(parents=True, exist_ok=True)
          batch_count = min(len(inbox_files), batch_size)
          for f in inbox_files[:batch_count]:
              shutil.move(str(f), str(processed_dir / f.name))
          print(f"Moved {batch_count} inbox files to processed/")
          PYEOF

      - name: Commit proposals + skill updates
        id: commit
        if: always()
        run: |
          git config user.name "vxis-growth[bot]"
          git config user.email "vxis-growth@users.noreply.github.com"
          # Stage both signal state AND skill file changes
          git add .vxis/ 2>/dev/null || true
          git add src/vxis/agent/skills/ 2>/dev/null || true
          SKILL_CHANGES=$(git diff --staged --name-only -- 'src/vxis/agent/skills/' | wc -l | tr -d ' ')
          echo "skill_changes=$SKILL_CHANGES" >> "$GITHUB_OUTPUT"
          if ! git diff --staged --quiet; then
            git commit -m "chore(growth): analyze batch $(date -u +%Y-%m-%dT%H:%M) [skills: $SKILL_CHANGES updated]"
            for i in 1 2 3; do
              git fetch origin main
              if git rebase origin/main; then
                git push && break
              else
                git rebase --abort || true
              fi
              sleep 5
            done
          fi

      - name: Trigger growth-loop benchmark if skills changed
        if: steps.commit.outputs.skill_changes != '0' && steps.commit.outputs.skill_changes != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Skills changed (${{ steps.commit.outputs.skill_changes }} files) — triggering growth-loop validation"
          gh api repos/${{ github.repository }}/dispatches \
            -f event_type=growth-loop-validate \
            -f client_payload='{"trigger":"signal-analyze","skill_changes":"${{ steps.commit.outputs.skill_changes }}"}' \
            || echo "dispatch failed (may need PAT with repo scope)"

      - name: Create PR for pending proposals
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PYEOF'
          import json, subprocess
          from pathlib import Path

          pending_dir = Path(".vxis/signals/pending")
          if not pending_dir.exists():
              exit(0)

          pending_files = sorted(pending_dir.glob("*.json"))
          if not pending_files:
              exit(0)

          # Only create PR for skill_payload_add proposals
          skill_proposals = []
          for f in pending_files:
              try:
                  d = json.loads(f.read_text())
                  if d.get("change_type") == "skill_payload_add":
                      skill_proposals.append(d)
              except Exception:
                  pass

          if not skill_proposals:
              print(f"No skill proposals in {len(pending_files)} pending — skip PR")
              exit(0)

          # Apply the pending proposals to a branch
          branch = f"growth/pending-skills-{len(skill_proposals)}"
          subprocess.run(["git", "checkout", "-b", branch], check=True)

          from vxis.growth.apply import _apply_skill_payload
          from vxis.growth.schemas import Proposal
          import dataclasses as dc

          applied = 0
          body_lines = ["## Pending Skill Payload Proposals\n"]
          body_lines.append("These payloads were designed by LLM from threat intelligence signals.")
          body_lines.append("Review and merge if they look correct.\n")

          for d in skill_proposals:
              try:
                  p = Proposal(**{k: v for k, v in d.items() if k in [f.name for f in dc.fields(Proposal)]})
                  result = _apply_skill_payload(p)
                  if result:
                      applied += 1
                      cd = d.get("change_data", {})
                      body_lines.append(f"- **{cd.get('technique', '?')}**: `{cd.get('payload', '')[:60]}`")
                      body_lines.append(f"  - Source: {d.get('source_url', '?')[:80]}")
                      body_lines.append(f"  - Confidence: {d.get('confidence', 0):.0%}")
                      body_lines.append(f"  - Target: `{d.get('target_file', '?')}`\n")
              except Exception:
                  pass

          if applied == 0:
              print("No proposals applied — skip PR")
              exit(0)

          subprocess.run(["git", "add", "src/vxis/agent/skills/"], check=True)
          subprocess.run(["git", "commit", "-m",
              f"feat(growth): {applied} pending skill payload(s) for review"], check=True)
          subprocess.run(["git", "push", "-u", "origin", branch], check=True)

          body = "\n".join(body_lines)
          subprocess.run([
              "gh", "pr", "create",
              "--title", f"[Growth] {applied} new attack payload(s) for review",
              "--body", body,
              "--label", "growth-loop",
              "--base", "main",
          ])
          print(f"PR created with {applied} payloads on branch {branch}")
          PYEOF

      - name: Send Telegram notification (tiered)
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -f _analyze_result.json ]; then
            python - <<'PYEOF'
          import json, os, urllib.request, urllib.parse

          try:
              result = json.load(open("_analyze_result.json"))
          except Exception:
              exit(0)

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          if not token or not chat_id:
              exit(0)

          auto = result.get("auto_applied", 0)
          pending = result.get("pending_review", 0)
          discarded = result.get("discarded", 0)
          skills = result.get("skill_files_modified", 0)
          total = result.get("total", 0)
          dry_run = result.get("dry_run", True)

          if total == 0:
              exit(0)

          # Load proposal details — human-readable format
          from pathlib import Path

          # Map internal types to readable descriptions
          type_labels = {
              "vector_add": "New scoring vector",
              "skill_payload_add": "New attack payload",
              "kb_pattern_add": "New knowledge pattern",
              "guide_advice_append": "Phase guide update",
          }

          def format_proposal(d):
              ct = d.get("change_type", "?")
              label = type_labels.get(ct, ct)
              conf = d.get("confidence", 0)
              # Extract the actual useful info
              cd = d.get("change_data", {})
              if ct == "skill_payload_add":
                  tech = cd.get("technique", "?")
                  payload = cd.get("payload", "")[:40]
                  return f"  {label} [{tech}]: {payload} ({conf:.0%})"
              elif ct == "vector_add":
                  name = cd.get("name_en", "")[:50]
                  return f"  {label}: {name} ({conf:.0%})"
              else:
                  rationale = d.get("rationale_en", "")[:50]
                  return f"  {label}: {rationale} ({conf:.0%})"

          applied_details = []
          pending_details = []
          applied_dir = Path(".vxis/signals/applied")
          pending_dir = Path(".vxis/signals/pending")
          if applied_dir.exists():
              for f in sorted(applied_dir.glob("*.json"))[-5:]:
                  try:
                      applied_details.append(format_proposal(json.loads(f.read_text())))
                  except Exception:
                      pass
          if pending_dir.exists():
              for f in sorted(pending_dir.glob("*.json"))[-5:]:
                  try:
                      pending_details.append(format_proposal(json.loads(f.read_text())))
                  except Exception:
                      pass

          lines = ["VXIS Growth"]

          if skills > 0:
              lines.append(f"\n🟢 {skills} skill file(s) auto-updated")
              lines.append("→ Benchmark validation triggered")

          if auto > 0:
              lines.append(f"\n🟢 Auto-applied ({auto}):")
              lines.extend(applied_details[:5])

          if pending > 0:
              lines.append(f"\n🟡 Review needed ({pending}):")
              lines.extend(pending_details[:5])

          if discarded > 0:
              lines.append(f"\n🔴 Dropped: {discarded} (low confidence)")

          if not auto and not pending and not skills:
              lines.append("No actionable items.")

          msg = "\n".join(lines)
          url = f"https://api.telegram.org/bot{token}/sendMessage"
          data = urllib.parse.urlencode({"chat_id": chat_id, "text": msg}).encode()
          try:
              urllib.request.urlopen(url, data=data, timeout=10)
              print("telegram sent")
          except Exception as e:
              print(f"telegram failed: {e}")
          PYEOF
          fi
