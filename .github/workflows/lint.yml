name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Check linting
        run: uv run ruff check src/ tests/

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
          else
            BASE="${{ github.event.before }}"
            if [ -z "$BASE" ] || [[ "$BASE" =~ ^0+$ ]]; then
              BASE="HEAD~1"
            fi
          fi
          mapfile -t PY_FILES < <(
            git diff --name-only --diff-filter=ACMR "$BASE" HEAD -- src tests \
              | grep -E '\.py$' || true
          )
          if [ "${#PY_FILES[@]}" -eq 0 ]; then
            echo "No changed Python files to format-check."
            exit 0
          fi
          uv run ruff format --check "${PY_FILES[@]}"

      - name: Check phase sync (pipeline ↔ docs)
        run: uv run python scripts/check_phase_sync.py
