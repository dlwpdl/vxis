name: Signal Ingest

on:
  # Cost guard: raw ingest is noisy and can burn free-tier minutes quickly.
  # Run manually after reviewing upstream/domain/CVE digests.
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: signal-ingest
  cancel-in-progress: true

jobs:
  ingest:
    name: Unify signals from all sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install VXIS
        run: |
          pip install -e . 2>/dev/null || true
          echo "PYTHONPATH=src" >> "$GITHUB_ENV"

      - name: Run ingest
        id: ingest
        run: |
          python - <<'PYEOF'
          from vxis.growth.ingest import ingest_all
          count = ingest_all()
          print(f"Ingested {count} unique signals")
          with open("_ingest_count.txt", "w") as f:
              f.write(str(count))
          PYEOF

      - name: Commit signal inbox
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f .vxis/signals/inbox/ 2>/dev/null || true
          if git diff --cached --quiet -- .vxis/signals/inbox; then
            echo "No signal inbox changes"
          else
            git commit -m "chore: ingest signal inbox $(date -u +%Y-%m-%dT%H)"
            git pull --rebase origin main
            git push
          fi

      - name: Archive signals
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vxis-signal-inbox
          path: .vxis/signals/inbox/
          if-no-files-found: ignore
