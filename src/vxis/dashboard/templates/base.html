<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}VXIS Dashboard{% endblock %}</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX + SSE extension -->
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sidebar: {
              bg: '#0f1117',
              hover: '#1a1d2e',
              active: '#1e2235',
              border: '#1f2333',
            },
            surface: {
              DEFAULT: '#161923',
              raised: '#1c2030',
              border: '#252a3d',
            },
          }
        }
      }
    }
  </script>

  <style>
    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f1117; }
    ::-webkit-scrollbar-thumb { background: #2d3355; border-radius: 3px; }

    /* HTMX loading indicator */
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-indicator { display: none; }

    /* Severity badge base */
    .severity-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>

  {% block head %}{% endblock %}
</head>

<body class="h-full bg-gray-950 text-gray-100 flex">

  <!-- Sidebar -->
  <aside class="w-56 flex-shrink-0 flex flex-col bg-sidebar-bg border-r border-sidebar-border min-h-screen">

    <!-- Logo / brand -->
    <div class="h-14 flex items-center px-5 border-b border-sidebar-border">
      <div class="flex items-center gap-2.5">
        <!-- Shield icon -->
        <svg class="w-6 h-6 text-cyan-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span class="text-base font-bold tracking-widest text-white">VXIS</span>
      </div>
    </div>

    <!-- Nav links -->
    <nav class="flex-1 py-4 px-2 space-y-0.5">
      <a href="/"
         class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors
                {% if request.url.path == '/' %}bg-sidebar-active text-cyan-400{% else %}text-gray-400 hover:bg-sidebar-hover hover:text-gray-100{% endif %}">
        <!-- Grid icon -->
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>

      <a href="/scan/new"
         class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors
                {% if request.url.path == '/scan/new' %}bg-sidebar-active text-cyan-400{% else %}text-gray-400 hover:bg-sidebar-hover hover:text-gray-100{% endif %}">
        <!-- Play icon -->
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        New Scan
      </a>

      <a href="/"
         class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors
                {% if '/scan/' in request.url.path and request.url.path != '/scan/new' %}bg-sidebar-active text-cyan-400{% else %}text-gray-400 hover:bg-sidebar-hover hover:text-gray-100{% endif %}">
        <!-- Activity icon -->
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Scans
      </a>

      <a href="/clients"
         class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors
                {% if '/client' in request.url.path %}bg-sidebar-active text-cyan-400{% else %}text-gray-400 hover:bg-sidebar-hover hover:text-gray-100{% endif %}">
        <!-- Users icon -->
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Clients
      </a>

      <a href="/scans/active"
         class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors
                {% if request.url.path.startswith('/scans/active') %}bg-sidebar-active text-cyan-400{% else %}text-gray-400 hover:bg-sidebar-hover hover:text-gray-100{% endif %}">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
        </svg>
        Live
      </a>

      <a href="/trends"
         class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors
                {% if request.url.path.startswith('/trends') or '/trend' in request.url.path %}bg-sidebar-active text-cyan-400{% else %}text-gray-400 hover:bg-sidebar-hover hover:text-gray-100{% endif %}">
        <!-- Trend line icon -->
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
          <polyline points="17 6 23 6 23 12"/>
        </svg>
        Trends
      </a>

      <a href="/phases"
         class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors
                {% if request.url.path.startswith('/phases') %}bg-sidebar-active text-cyan-400{% else %}text-gray-400 hover:bg-sidebar-hover hover:text-gray-100{% endif %}">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="12" width="4" height="9"/><rect x="10" y="6" width="4" height="15"/><rect x="17" y="3" width="4" height="18"/>
        </svg>
        Phases
      </a>

      <a href="/scan/new"
         class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors
                {% if request.url.path == '/scan/new' %}bg-sidebar-active text-cyan-400{% else %}text-gray-400 hover:bg-sidebar-hover hover:text-gray-100{% endif %}">
        <!-- Crosshair / target icon -->
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/>
          <line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/>
          <line x1="12" y1="22" x2="12" y2="18"/>
        </svg>
        New Scan
      </a>

      <a href="/plugins"
         class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors
                {% if request.url.path == '/plugins' %}bg-sidebar-active text-cyan-400{% else %}text-gray-400 hover:bg-sidebar-hover hover:text-gray-100{% endif %}">
        <!-- Layers / plugin icon -->
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        Plugins
      </a>

      <a href="/kb"
         class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors
                {% if '/kb' in request.url.path %}bg-sidebar-active text-cyan-400{% else %}text-gray-400 hover:bg-sidebar-hover hover:text-gray-100{% endif %}">
        <!-- Book icon -->
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        Knowledge Base
      </a>
    </nav>

    <!-- Footer -->
    <div class="px-4 py-3 border-t border-sidebar-border">
      <p class="text-xs text-gray-600">VXIS v0.1.0</p>
    </div>
  </aside>

  <!-- Main content -->
  <div class="flex-1 flex flex-col min-h-screen overflow-auto">

    <!-- Top bar -->
    <header class="h-14 flex-shrink-0 flex items-center px-6 border-b border-surface-border bg-surface">
      <div class="flex-1">
        {% block breadcrumb %}
        <span class="text-sm text-gray-500">VXIS Security Dashboard</span>
        {% endblock %}
      </div>
      <div class="flex items-center gap-3">
        <!-- Status indicator -->
        <div class="flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-green-500 inline-block"></span>
          <span class="text-xs text-gray-500">Online</span>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 p-6">
      {% block content %}{% endblock %}
    </main>
  </div>

</body>
</html>
