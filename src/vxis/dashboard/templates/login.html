<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VXIS Dashboard — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: {
              DEFAULT: '#161923',
              raised: '#1c2030',
              border: '#252a3d',
            },
          }
        }
      }
    }
  </script>
</head>
<body class="h-full bg-gray-950 text-gray-100 flex items-center justify-center">
  <div class="w-full max-w-sm mx-auto">
    <div class="flex items-center justify-center gap-3 mb-8">
      <svg class="w-8 h-8 text-cyan-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span class="text-xl font-bold tracking-widest text-white">VXIS</span>
    </div>

    <div class="bg-surface rounded-lg border border-surface-border p-6">
      <h1 class="text-lg font-semibold mb-1">Dashboard Login</h1>
      <p class="text-sm text-gray-500 mb-6">Sign in with your account.</p>

      {% if error %}
      <div class="mb-4 px-3 py-2 rounded bg-red-900/40 border border-red-700 text-red-300 text-sm">
        Invalid credentials. Please try again.
      </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-400 mb-1">Username</label>
          <input type="text" id="username" name="username" required autofocus
                 class="w-full px-3 py-2 rounded-md bg-gray-900 border border-surface-border text-gray-100
                        focus:outline-none focus:ring-2 focus:ring-cyan-500" />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-400 mb-1">Password</label>
          <input type="password" id="password" name="password" required
                 class="w-full px-3 py-2 rounded-md bg-gray-900 border border-surface-border text-gray-100
                        focus:outline-none focus:ring-2 focus:ring-cyan-500" />
        </div>

        {% if token_required %}
        <div>
          <label for="token" class="block text-sm font-medium text-gray-400 mb-1">Dashboard Token</label>
          <input type="password" id="token" name="token" required
                 class="w-full px-3 py-2 rounded-md bg-gray-900 border border-surface-border text-gray-100
                        focus:outline-none focus:ring-2 focus:ring-cyan-500" />
        </div>
        {% endif %}

        <button type="submit"
                class="w-full py-2 px-4 rounded-md bg-cyan-600 hover:bg-cyan-500 text-white font-medium">
          Sign In
        </button>
      </form>
    </div>
    <p class="text-center text-xs text-gray-600 mt-4">VXIS v0.1.0</p>
  </div>
</body>
</html>
