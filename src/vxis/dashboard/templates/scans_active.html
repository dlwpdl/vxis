{% extends "base.html" %}

{% block title %}Live Scans — VXIS{% endblock %}

{% block breadcrumb %}
<nav class="flex items-center gap-2 text-sm">
  <a href="/" class="text-gray-500 hover:text-gray-300">Dashboard</a>
  <span class="text-gray-600">/</span>
  <span class="text-gray-100 font-medium">Live</span>
</nav>
{% endblock %}

{% block content %}
<div class="space-y-6">
  <div>
    <h1 class="text-xl font-semibold text-white">Live Scan Activity</h1>
    <p class="text-sm text-gray-500 mt-0.5">Auto-refreshing every 5 seconds.</p>
  </div>

  <div hx-get="/scans/active/partial" hx-trigger="every 5s" hx-swap="innerHTML">
    {% include "partials/scans_active.html" %}
  </div>
</div>
{% endblock %}
