{% extends "base.html" %}

{% block title %}New Scan — VXIS Dashboard{% endblock %}

{% block breadcrumb %}
<nav class="flex items-center gap-2 text-sm">
  <a href="/" class="text-gray-500 hover:text-gray-300">Dashboard</a>
  <span class="text-gray-600">/</span>
  <span class="text-gray-300">New Scan</span>
</nav>
{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">

  <!-- Header -->
  <div class="mb-8">
    <h1 class="text-2xl font-bold text-white mb-1">Launch New Scan</h1>
    <p class="text-sm text-gray-500">Configure and start a security scan against a target.</p>
  </div>

  <!-- Scan Form -->
  <div id="scan-form-card" class="bg-surface rounded-lg border border-surface-border p-6">
    <form id="scan-form" method="POST" action="/api/scan/start" class="space-y-5">

      <!-- Target -->
      <div>
        <label for="target" class="block text-sm font-medium text-gray-300 mb-1.5">Target</label>
        <input
          type="text"
          id="target"
          name="target"
          required
          placeholder="e.g. example.com or 192.168.1.0/24"
          class="w-full px-3 py-2 rounded-md bg-gray-900 border border-surface-border text-gray-100 text-sm
                 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
        />
      </div>

      <!-- Scan Type -->
      <div>
        <label for="scan_type" class="block text-sm font-medium text-gray-300 mb-1.5">Scan Type</label>
        <select
          id="scan_type"
          name="scan_type"
          class="w-full px-3 py-2 rounded-md bg-gray-900 border border-surface-border text-gray-100 text-sm
                 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
        >
          {% for value, label in scan_types.items() %}
          <option value="{{ value }}" {% if value == "external" %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Profile -->
      <div>
        <label for="profile" class="block text-sm font-medium text-gray-300 mb-1.5">Scan Profile</label>
        <select
          id="profile"
          name="profile"
          class="w-full px-3 py-2 rounded-md bg-gray-900 border border-surface-border text-gray-100 text-sm
                 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
        >
          <option value="passive">정보 수집만 · Passive</option>
          <option value="standard">안전 점검 · Standard</option>
          <option value="crown" selected>실전 검증 · Crown (권장)</option>
          <option value="bugbounty">버그바운티 · Bug Bounty</option>
          <option value="stealth">조용한 점검 · Stealth</option>
          <option value="aggressive">랩 전체 허용 · Aggressive</option>
        </select>
      </div>

      <!-- Submit -->
      <div class="pt-2">
        <button
          type="submit"
          id="scan-submit-btn"
          class="w-full px-4 py-2.5 rounded-md bg-cyan-600 hover:bg-cyan-500 text-white text-sm font-semibold
                 transition-colors focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-offset-2 focus:ring-offset-gray-900"
        >
          Start Scan
        </button>
      </div>
    </form>
  </div>

</div>
{% endblock %}
