{% extends "base.html" %}

{% block title %}New Scan — VXIS{% endblock %}

{% block breadcrumb %}
<span class="text-sm text-gray-500">New Scan</span>
{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">

  <h1 class="text-2xl font-bold text-white mb-6">새 스캔 시작</h1>

  <form hx-post="/api/scan/start" hx-target="#scan-result" hx-swap="innerHTML"
        class="space-y-6 bg-surface rounded-lg border border-surface-border p-6">

    <!-- Target -->
    <div>
      <label class="block text-sm font-medium text-gray-300 mb-2">스캔 대상</label>
      <input type="text" name="target" required
             placeholder="example.com, 192.168.1.0/24, ..."
             class="w-full px-4 py-2.5 bg-gray-900 border border-surface-border rounded-md
                    text-white placeholder-gray-600
                    focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent" />
    </div>

    <!-- Scan Type -->
    <div>
      <label class="block text-sm font-medium text-gray-300 mb-2">스캔 유형</label>
      <div class="grid grid-cols-2 gap-3">
        {% for key, label, icon, desc in scan_types %}
        <label class="relative flex items-start gap-3 p-3 bg-gray-900 border border-surface-border rounded-md
                      cursor-pointer hover:border-cyan-500/50 transition-colors
                      has-[:checked]:border-cyan-500 has-[:checked]:bg-cyan-500/5">
          <input type="radio" name="scan_type" value="{{ key }}"
                 {% if key == 'external' %}checked{% endif %}
                 class="mt-0.5 accent-cyan-500" />
          <div>
            <span class="text-sm font-medium text-white">{{ icon }} {{ label }}</span>
            <p class="text-xs text-gray-500 mt-0.5">{{ desc }}</p>
          </div>
        </label>
        {% endfor %}
      </div>
    </div>

    <!-- Profile -->
    <div>
      <label class="block text-sm font-medium text-gray-300 mb-2">스캔 강도</label>
      <select name="profile"
              class="w-full px-4 py-2.5 bg-gray-900 border border-surface-border rounded-md
                     text-white focus:outline-none focus:ring-2 focus:ring-cyan-500">
        <option value="passive">🔍 Passive — 직접 접촉 없음</option>
        <option value="stealth">🐢 Stealth — IDS 우회용 저속</option>
        <option value="standard" selected>⚡ Standard — 일반 속도 (권장)</option>
        <option value="aggressive">🚀 Aggressive — 최대 속도 (랩 전용)</option>
      </select>
    </div>

    <!-- Submit -->
    <button type="submit"
            class="w-full py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-medium rounded-md
                   transition-colors flex items-center justify-center gap-2">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      스캔 시작
    </button>

  </form>

  <!-- Result container (HTMX target) -->
  <div id="scan-result" class="mt-6"></div>

</div>
{% endblock %}
