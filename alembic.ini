# Alembic configuration for VXIS
# https://alembic.sqlalchemy.org/en/latest/

[alembic]
# Path to migration scripts directory
script_location = alembic

# Default database URL — SQLite in the user's home directory.
# Override via VXIS_DB_URL environment variable or by editing this value.
sqlalchemy.url = sqlite+aiosqlite:///~/.vxis/scans.db

# Template used to generate new migration script files.
file_template = %%(rev)s_%%(slug)s

# Truncate long revision identifiers in filenames to this many characters.
truncate_slug_length = 40

# Set to 'true' to run the environment during 'revision --autogenerate'.
# revision_environment = false

# Timezone to use when rendering the date within the migration file.
# timezone =

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
